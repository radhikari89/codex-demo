  <desc id="desc">Public home routes to login or signup, both route to authenticated dashboard, then dashboard routes to AI, Blockchain, Security, Misc, and Profile or Settings.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333333" />
    </marker>
    <style>
      .node { fill: #ececff; stroke: #9370db; stroke-width: 1.5; }
      .label { fill: #333333; font-family: "Trebuchet MS", Verdana, Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: middle; }
      .link { stroke: #333333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="980" height="520" fill="#ffffff" />

